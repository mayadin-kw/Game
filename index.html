<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>لعبة الأسئلة المباشرة</title>
    <meta name="theme-color" content="#ffb347" />
    <meta
      name="description"
      content="موقع ألعاب احترافي لعرض أسئلة ملف Excel وإنشاء غرف مباشرة مع دردشة وتحكم كامل لصاحب الغرفة."
    />
    <meta property="og:locale" content="ar_AR" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="لعبة الأسئلة المباشرة" />
    <meta property="og:title" content="لعبة الأسئلة المباشرة | غرف لعب فورية ومشاركة سهلة" />
    <meta
      property="og:description"
      content="ارفع ملف Excel، أنشئ غرفة فوراً، وشارك رابطها مع بطاقة معاينة جذابة تظهر عند الإرسال."
    />
    <meta property="og:url" content="https://sli0tin.github.io/Game/" />
    <meta property="og:image" content="https://sli0tin.github.io/Game/assets/og-preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="بطاقة معاينة لعبة الأسئلة المباشرة" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="لعبة الأسئلة المباشرة | غرف لعب فورية ومشاركة سهلة" />
    <meta
      name="twitter:description"
      content="ارفع ملف Excel، أنشئ غرفة فوراً، وشارك رابطها مع بطاقة معاينة جذابة تظهر عند الإرسال."
    />
    <meta name="twitter:image" content="https://sli0tin.github.io/Game/assets/og-preview.png" />
    <meta name="twitter:image:alt" content="بطاقة معاينة لعبة الأسئلة المباشرة" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800&family=Cairo:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="canonical" href="https://sli0tin.github.io/Game/" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <div class="ambient ambient-three"></div>

      <header class="topbar">
        <div class="brand-block">
          <span class="brand-mark">س</span>
          <div>
            <p class="eyebrow">غرف مباشرة + Excel + Firebase</p>
            <h1>لعبة الأسئلة المباشرة</h1>
          </div>
        </div>
        <div id="topMeta" class="top-meta" aria-live="polite"></div>
      </header>

      <main class="workspace">
        <section id="screen" class="screen-panel" aria-live="polite"></section>
      </main>

      <aside class="chat-shell">
        <div class="chat-top">
          <div>
            <p class="chat-title">الدردشة</p>
            <span id="chatHint" class="chat-hint">أنشئ غرفة أو ادخل غرفة لبدء المحادثة.</span>
          </div>
          <button id="rulesBtn" class="ghost-button" type="button">القوانين</button>
        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="chatInput"
            class="chat-input"
            type="text"
            maxlength="200"
            autocomplete="off"
            placeholder="اكتب رسالتك هنا..."
          />
          <button id="chatSendBtn" class="primary-button compact" type="submit">إرسال</button>
        </form>
      </aside>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
